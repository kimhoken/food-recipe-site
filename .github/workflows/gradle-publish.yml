name: Deploy to EC2 with SCP

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 푸시되면 자동 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 코드 가져오기
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. JDK 17 세팅
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. Secrets를 이용해 application.properties 파일 생성하기 (여기가 추가된 부분!)
    - name: Make application.properties
      run: |
        mkdir -p src/main/resources
        echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.properties

    # 4. Gradle 권한 부여 및 빌드 (WAR 파일 생성)
    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew build -x test 
        # -x test는 테스트 코드를 건너뛰는 옵션이야. 배포 속도를 위해 일단 넣었어!

    # 5. SCP로 EC2에 빌드된 파일 전송하기
    - name: Copy WAR file to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        source: "build/libs/*.war" # 전송할 파일
        target: "~/deploy" # EC2 내부의 도착 폴더
        rm: true # 기존 파일 삭제 후 새 파일 복사

    # 6. SSH로 EC2에 접속해서 실행 명령 내리기
    - name: Execute Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/deploy/build/libs
          # 실행 중인 기존 스프링 부트 서버 강제 종료 (8080 포트 기준)
          sudo fuser -k -n tcp 8080 || true
          
          # 백그라운드에서 새 WAR 파일 실행 (로그는 app.log에 저장)
          nohup java -jar *.war > app.log 2>&1 &